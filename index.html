<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🚒 しょうぼうしゃ ゲーム 🔥</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;
  font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo','Segoe UI Emoji','Noto Color Emoji',sans-serif;
  touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
canvas{display:block;width:100%;height:100%;}

/* ========== Overlay Screens ========== */
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;
  justify-content:center;align-items:center;z-index:100;}
#startScreen{background:linear-gradient(135deg,#FF6B6B 0%,#FFD93D 50%,#6BCB77 100%);}
#courseScreen{background:linear-gradient(135deg,#4ECDC4 0%,#556270 100%);overflow-y:auto;}
#victoryScreen{background:linear-gradient(135deg,#FFD700 0%,#FF6347 50%,#FFD700 100%);display:none;}
#stageClrScreen{background:rgba(0,0,0,0.75);display:none;}

.title{font-size:min(8vw,56px);margin-bottom:8px;text-shadow:3px 3px 6px rgba(0,0,0,0.3);color:#fff;}
.subtitle{font-size:min(5vw,28px);margin-bottom:12px;color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,0.4);}
.bigBtn{font-size:min(5vw,32px);padding:16px 48px;border:none;border-radius:20px;cursor:pointer;
  box-shadow:0 6px 0 rgba(0,0,0,0.25);transition:transform .1s;color:#fff;margin:8px;min-width:200px;}
.bigBtn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.25);}
.btn-red{background:#FF4444;}
.btn-blue{background:#4488FF;}
.btn-green{background:#44BB44;}
.btn-orange{background:#FF8800;}

/* ========== Course Select ========== */
#courseGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px;
  max-width:900px;width:90%;}
.courseCard{background:rgba(255,255,255,0.15);border-radius:16px;padding:14px 8px;
  text-align:center;cursor:pointer;border:3px solid rgba(255,255,255,0.3);
  transition:transform .15s,background .15s;min-height:100px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;}
.courseCard:active{transform:scale(0.95);}
.courseCard.unlocked{background:rgba(255,255,255,0.25);border-color:#FFD700;}
.courseCard.unlocked:hover{background:rgba(255,255,255,0.35);}
.courseCard.locked{opacity:0.5;pointer-events:none;}
.courseNum{font-size:min(5vw,32px);color:#fff;font-weight:bold;}
.courseStars{font-size:min(4vw,24px);margin-top:4px;}
.courseDiff{font-size:min(2.5vw,14px);color:rgba(255,255,255,0.7);margin-top:2px;}
#courseBackBtn{margin-top:12px;margin-bottom:16px;}

/* ========== HUD ========== */
#hud{position:absolute;top:6px;left:10px;right:10px;display:none;z-index:50;pointer-events:none;}
#scoreDisp{font-size:min(4vw,24px);color:#fff;text-shadow:2px 2px 2px #000;}
#courseDisp{font-size:min(3vw,18px);color:#FFD700;text-shadow:2px 2px 2px #000;margin-top:2px;}

/* ========== Touch Controls ========== */
#controls{position:absolute;bottom:0;left:0;width:100%;display:none;
  justify-content:space-between;padding:10px 16px;z-index:50;}
.cg{display:flex;gap:10px;align-items:flex-end;}
.cb{width:min(20vw,88px);height:min(20vw,88px);border-radius:50%;
  border:3px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.2);
  font-size:min(8vw,40px);cursor:pointer;display:flex;justify-content:center;align-items:center;
  -webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px);}
.cb:active{background:rgba(255,255,255,0.5);}
.cb-water{background:rgba(0,150,255,0.35);border-color:rgba(0,200,255,0.7);}
.cb-jump{background:rgba(255,200,0,0.3);border-color:rgba(255,220,0,0.7);}

/* ========== Stage Clear Overlay ========== */
#stageClrScreen .clr-box{background:rgba(255,255,255,0.1);border-radius:24px;padding:28px 40px;
  text-align:center;backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,0.3);}
#stageClrScreen .clr-title{font-size:min(7vw,48px);color:#FFD700;text-shadow:2px 2px 4px #000;margin-bottom:8px;}
#stageClrScreen .clr-stars{font-size:min(10vw,64px);margin:8px 0;}
#stageClrScreen .clr-score{font-size:min(4vw,24px);color:#fff;margin-bottom:12px;}

/* Responsive tweaks for smaller tablets / phones */
@media(max-height:500px){
  .cb{width:64px;height:64px;font-size:28px;}
  #controls{padding:4px 10px;}
}
</style>
</head>
<body>

<!-- ======= START SCREEN ======= -->
<div class="overlay" id="startScreen">
  <div class="title">🚒 しょうぼうしゃ ゲーム 🔥</div>
  <div class="subtitle">ひを けしながら すすもう！</div>
  <div style="font-size:min(3vw,18px);color:rgba(255,255,255,0.8);margin:8px;text-align:center;line-height:1.8;">
    ⬅️➡️ いどう &nbsp; ⬆️ ジャンプ &nbsp; 💧 みずをだす<br>
    🔥 ひをぜんぶ けそう！ ぜんぶで 10コース！
  </div>
  <button class="bigBtn btn-red" id="btnStart">🚒 はじめる！</button>
</div>

<!-- ======= COURSE SELECT ======= -->
<div class="overlay" id="courseScreen" style="display:none;">
  <div class="title" style="margin-top:12px;">🗺️ コースを えらぼう</div>
  <div id="courseGrid"></div>
  <button class="bigBtn btn-blue" id="courseBackBtn">🔙 もどる</button>
</div>

<!-- ======= STAGE CLEAR ======= -->
<div class="overlay" id="stageClrScreen">
  <div class="clr-box">
    <div class="clr-title">🎉 ステージ クリア！</div>
    <div class="clr-stars" id="clrStars">⭐⭐⭐</div>
    <div class="clr-score" id="clrScore">スコア: 0</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button class="bigBtn btn-green" id="btnNextCourse">➡️ つぎのコース</button>
      <button class="bigBtn btn-orange" id="btnBackSelect">🗺️ コースせんたく</button>
    </div>
  </div>
</div>

<!-- ======= CANVAS ======= -->
<canvas id="gc"></canvas>

<!-- ======= HUD ======= -->
<div id="hud">
  <div id="scoreDisp">⭐ 0</div>
  <div id="courseDisp"></div>
</div>

<!-- ======= TOUCH CONTROLS ======= -->
<div id="controls">
  <div class="cg">
    <div class="cb" id="tbL">⬅️</div>
    <div class="cb" id="tbR">➡️</div>
  </div>
  <div class="cg">
    <div class="cb cb-jump" id="tbJ">⬆️</div>
    <div class="cb cb-water" id="tbW">💧</div>
  </div>
</div>

<script>
// ============================================================
//  AUDIO
// ============================================================
const AC=window.AudioContext||window.webkitAudioContext;let ac;
function initAudio(){if(!ac)ac=new AC();}
function tone(f,d,t='square',v=.12){if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}
function sndWater(){tone(800,.1,'sine',.08);setTimeout(()=>tone(600,.1,'sine',.08),50);}
function sndJump(){tone(400,.12,'square',.08);setTimeout(()=>tone(600,.12,'square',.08),80);}
function sndExt(){tone(1000,.12,'sine',.1);setTimeout(()=>tone(1200,.15,'sine',.1),100);}
function sndHit(){tone(200,.2,'sawtooth',.1);}
function sndVictory(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.3,'square',.1),i*180));}
function sndLevelUp(){[784,988,1175,1568].forEach((f,i)=>setTimeout(()=>tone(f,.25,'sine',.1),i*120));}

// ============================================================
//  CANVAS
// ============================================================
const C=document.getElementById('gc'),X=C.getContext('2d');
function resize(){C.width=window.innerWidth;C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// ============================================================
//  COURSE DEFINITIONS
// ============================================================
const COURSES=[
  {id:1, len:3000,  fires:5,  miniFires:5,  speed:3.5,obstacles:0, movingFires:false,wind:0,     label:'やさしい 🌱'},
  {id:2, len:3500,  fires:7,  miniFires:5,  speed:3.8,obstacles:0, movingFires:false,wind:0,     label:'かんたん 🌿'},
  {id:3, len:4000,  fires:10, miniFires:6,  speed:4.0,obstacles:0, movingFires:true, wind:0,     label:'ふつう 🌳'},
  {id:4, len:4500,  fires:12, miniFires:7,  speed:4.0,obstacles:0, movingFires:true, wind:0.15,  label:'かぜ 🍃'},
  {id:5, len:5000,  fires:15, miniFires:7,  speed:4.2,obstacles:3, movingFires:true, wind:0,     label:'いわ 🪨'},
  {id:6, len:5500,  fires:17, miniFires:8,  speed:4.3,obstacles:4, movingFires:true, wind:0.1,   label:'むずかしい 💪'},
  {id:7, len:6000,  fires:20, miniFires:9,  speed:4.5,obstacles:5, movingFires:true, wind:0.2,   label:'たいへん 🔥'},
  {id:8, len:6500,  fires:22, miniFires:10, speed:4.6,obstacles:6, movingFires:true, wind:0.15,  label:'げきむず 🌪️'},
  {id:9, len:7000,  fires:25, miniFires:12, speed:4.8,obstacles:7, movingFires:true, wind:0.25,  label:'ちょうきょう 💥'},
  {id:10,len:8000,  fires:30, miniFires:15, speed:5.0,obstacles:9, movingFires:true, wind:0.3,   label:'ボス 🏆',boss:true},
];

// ============================================================
//  SAVE / LOAD
// ============================================================
const SAVE_KEY='firetruck_save_v2';
let save={unlocked:1,stars:{}};
function loadSave(){try{let s=localStorage.getItem(SAVE_KEY);if(s)save=JSON.parse(s);}catch(e){}}
function doSave(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save));}catch(e){}}
loadSave();

// ============================================================
//  GAME STATE
// ============================================================
let state='start'; // start,courseSelect,playing,minigame,stageClear
let curCourse=0; // index
let score=0,camX=0;
const GH=90; // ground height

// Truck
let tk={x:0,y:0,w:90,h:60,vy:0,og:true,spd:4};

// Input
let keys={left:false,right:false,up:false,space:false};

// World objects
let fires=[],bullets=[],buildings=[],clouds=[],trees=[],obstacles=[];
let bCool=0; // bullet cooldown

// Mini-game
let miniFires=[],mgBuilding={},mgRegenUsed=false;

// Particles
let particles=[];

// Timer for animations
let tick=0;

// ============================================================
//  GENERATE WORLD
// ============================================================
function genWorld(){
  const co=COURSES[curCourse];
  fires=[];bullets=[];buildings=[];clouds=[];trees=[];obstacles=[];particles=[];
  score=0;camX=0;bCool=0;tick=0;
  tk.x=100;tk.y=0;tk.vy=0;tk.og=true;tk.spd=co.speed;

  // Fires
  let spacing=Math.floor((co.len-600)/(co.fires+1));
  for(let i=0;i<co.fires;i++){
    let fx=300+i*spacing+Math.random()*80;
    fires.push({x:fx,y:0,w:40,h:50,alive:true,fr:0,
      moving:co.movingFires&&Math.random()<0.4,amp:20+Math.random()*20,freq:.02+Math.random()*.01,phase:Math.random()*6});
  }

  // Obstacles (rocks)
  if(co.obstacles>0){
    let oSpacing=Math.floor((co.len-800)/co.obstacles);
    for(let i=0;i<co.obstacles;i++){
      let ox=500+i*oSpacing+Math.random()*100;
      // Make sure not overlapping with fires
      obstacles.push({x:ox,w:40+Math.random()*20,h:30+Math.random()*15});
    }
  }

  // Buildings (background decoration)
  for(let x=200;x<co.len+300;x+=150+Math.random()*160){
    let h=80+Math.random()*130,w=60+Math.random()*50;
    const cols=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#98D8C8','#F7DC6F','#C39BD3','#F1948A'];
    buildings.push({x,w,h,color:cols[Math.floor(Math.random()*cols.length)]});
  }

  // Clouds
  for(let i=0;i<25;i++){
    clouds.push({x:Math.random()*(co.len+400),y:20+Math.random()*100,r:20+Math.random()*35});
  }

  // Trees
  for(let x=100;x<co.len;x+=100+Math.random()*180){
    trees.push({x,h:35+Math.random()*30});
  }

  // Mini-game
  let mfCount=co.miniFires;
  mgBuilding={x:C.width/2-110,y:C.height-GH-220,w:220,h:220};
  miniFires=[];
  for(let i=0;i<mfCount;i++){
    miniFires.push({
      x:mgBuilding.x+20+Math.random()*(mgBuilding.w-60),
      y:mgBuilding.y+15+Math.random()*(mgBuilding.h-70),
      r:18+Math.random()*14,alive:true,fr:0,regen:false
    });
  }
  mgRegenUsed=false;
}

// ============================================================
//  GROUND Y helper
// ============================================================
function gY(){return C.height-GH;}

// ============================================================
//  DRAWING FUNCTIONS
// ============================================================
function drawSky(){
  let g=X.createLinearGradient(0,0,0,C.height);
  g.addColorStop(0,'#87CEEB');g.addColorStop(0.55,'#B0E0E6');g.addColorStop(1,'#90EE90');
  X.fillStyle=g;X.fillRect(0,0,C.width,C.height);
}

function drawGround(){
  X.fillStyle='#555';X.fillRect(0,gY(),C.width,GH);
  X.strokeStyle='#FFD700';X.lineWidth=3;X.setLineDash([30,20]);
  X.beginPath();let sx=-(camX%50);X.moveTo(sx,gY()+GH/2);X.lineTo(C.width,gY()+GH/2);X.stroke();
  X.setLineDash([]);
  X.fillStyle='#777';X.fillRect(0,gY(),C.width,8);
}

function drawClouds(){
  X.fillStyle='rgba(255,255,255,0.75)';
  clouds.forEach(c=>{
    let sx=c.x-camX*0.3;if(sx<-100||sx>C.width+100)return;
    X.beginPath();X.arc(sx,c.y,c.r,0,Math.PI*2);
    X.arc(sx+c.r*.8,c.y-c.r*.3,c.r*.65,0,Math.PI*2);
    X.arc(sx-c.r*.6,c.y-c.r*.15,c.r*.55,0,Math.PI*2);X.fill();
  });
}

function drawBuildings(){
  buildings.forEach(b=>{
    let sx=b.x-camX*0.5;if(sx<-b.w-20||sx>C.width+20)return;
    X.fillStyle=b.color;X.fillRect(sx,gY()-b.h,b.w,b.h);
    X.strokeStyle='rgba(0,0,0,0.15)';X.lineWidth=2;X.strokeRect(sx,gY()-b.h,b.w,b.h);
    X.fillStyle='rgba(255,255,200,0.85)';
    for(let wy=gY()-b.h+15;wy<gY()-10;wy+=28){
      for(let wx=sx+10;wx<sx+b.w-10;wx+=20){X.fillRect(wx,wy,10,14);}
    }
  });
}

function drawTrees(){
  trees.forEach(t=>{
    let sx=t.x-camX;if(sx<-50||sx>C.width+50)return;
    X.fillStyle='#8B4513';X.fillRect(sx-5,gY()-t.h,10,t.h);
    X.fillStyle='#228B22';X.beginPath();X.arc(sx,gY()-t.h-14,20,0,Math.PI*2);X.fill();
    X.fillStyle='#32CD32';X.beginPath();X.arc(sx+7,gY()-t.h-5,14,0,Math.PI*2);X.fill();
  });
}

function drawObstacles(){
  obstacles.forEach(o=>{
    let sx=o.x-camX;if(sx<-o.w-20||sx>C.width+80)return;
    // Rock
    X.fillStyle='#888';
    X.beginPath();
    X.moveTo(sx,gY());
    X.lineTo(sx+o.w*.2,gY()-o.h);
    X.lineTo(sx+o.w*.5,gY()-o.h-5);
    X.lineTo(sx+o.w*.8,gY()-o.h+3);
    X.lineTo(sx+o.w,gY());
    X.closePath();X.fill();
    X.strokeStyle='#666';X.lineWidth=2;X.stroke();
    // Emoji
    X.font=`${Math.min(o.w*0.5,24)}px serif`;
    X.fillText('🪨',sx+o.w*0.25,gY()-o.h*0.2);
  });
}

function drawFire(fx,fy,w,h,frame){
  let cols=['#FF4500','#FF6347','#FFD700','#FF8C00'];
  let t=frame*0.1;
  for(let i=0;i<5;i++){
    let ox=Math.sin(t+i*1.5)*w*0.3,oy=Math.cos(t+i*1.2)*h*0.2;
    let r=w*0.3+Math.sin(t+i)*5;
    X.fillStyle=cols[i%4];X.globalAlpha=.6+Math.sin(t+i)*.3;
    X.beginPath();X.arc(fx+w/2+ox,fy+h/2+oy-8,r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
  X.font=`${Math.max(18,w*0.65)}px serif`;X.fillText('🔥',fx+w*0.05,fy+h*0.7);
}

function drawWorldFires(){
  fires.forEach(f=>{
    if(!f.alive)return;
    let sx=f.x-camX;if(sx<-80||sx>C.width+80)return;
    let offsetY=0;
    if(f.moving)offsetY=Math.sin(tick*f.freq+f.phase)*f.amp;
    drawFire(sx,gY()-f.h+offsetY,f.w,f.h,f.fr);
  });
}

function drawBullets(){
  bullets.forEach(b=>{
    let sx=b.x-camX;
    X.fillStyle='#00BFFF';X.globalAlpha=.8;
    X.beginPath();X.arc(sx,b.y,6,0,Math.PI*2);X.fill();
    X.fillStyle='#87CEEB';
    X.beginPath();X.arc(sx-8,b.y,4,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(sx-14,b.y+1,3,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  });
}

function drawTruck(px,py){
  let sx=px-camX,sy=gY()-tk.h+py;
  // Body
  X.fillStyle='#FF2222';X.fillRect(sx,sy+10,tk.w,tk.h-25);
  // Cabin
  X.fillStyle='#CC0000';X.fillRect(sx+tk.w-30,sy,30,tk.h-15);
  // Window
  X.fillStyle='#AAE0FF';X.fillRect(sx+tk.w-25,sy+5,20,18);
  // Ladder
  X.fillStyle='#CCC';X.fillRect(sx+5,sy+8,50,5);X.fillRect(sx+5,sy+16,50,5);
  for(let lx=sx+10;lx<sx+55;lx+=12)X.fillRect(lx,sy+8,3,13);
  // Hose nozzle
  X.fillStyle='#4444FF';X.fillRect(sx+tk.w-5,sy+20,12,6);
  // Wheels
  X.fillStyle='#333';
  X.beginPath();X.arc(sx+20,sy+tk.h-15,12,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(sx+tk.w-20,sy+tk.h-15,12,0,Math.PI*2);X.fill();
  X.fillStyle='#999';
  X.beginPath();X.arc(sx+20,sy+tk.h-15,5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(sx+tk.w-20,sy+tk.h-15,5,0,Math.PI*2);X.fill();
  // Siren
  let flash=Math.sin(Date.now()*0.01)>0;
  X.fillStyle=flash?'#FF0000':'#0000FF';
  X.beginPath();X.arc(sx+tk.w-15,sy-3,6,0,Math.PI*2);X.fill();
  // Face
  X.font='14px serif';X.fillText('😊',sx+tk.w-24,sy+38);
}

function drawGoalMarker(){
  const co=COURSES[curCourse];
  let sx=co.len-camX;if(sx<-200||sx>C.width+200)return;
  let bh=180;
  X.fillStyle='#CC3333';X.fillRect(sx-80,gY()-bh,160,bh);
  X.fillStyle='#AA2222';X.fillRect(sx-80,gY()-bh,160,20);
  X.fillStyle='#FFD700';X.fillRect(sx-40,gY()-70,80,70);
  X.strokeStyle='#CC9900';X.lineWidth=2;
  for(let ly=gY()-60;ly<gY();ly+=15){X.beginPath();X.moveTo(sx-40,ly);X.lineTo(sx+40,ly);X.stroke();}
  X.fillStyle='#fff';X.font='bold '+Math.min(16,C.width*0.02)+'px sans-serif';
  X.textAlign='center';X.fillText('🚒 かじげんば 🔥',sx,gY()-bh-10);X.textAlign='left';
}

function drawProgressBar(){
  const co=COURSES[curCourse];
  let bw=C.width-40,bh=10,bx=20,by=50;
  let prog=Math.min(tk.x/co.len,1);
  X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(bx,by,bw,bh);
  let g=X.createLinearGradient(bx,0,bx+bw,0);
  g.addColorStop(0,'#4CAF50');g.addColorStop(1,'#FF5722');
  X.fillStyle=g;X.fillRect(bx,by,bw*prog,bh);
  X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=1;X.strokeRect(bx,by,bw,bh);
  X.font='14px serif';X.fillText('🚒',bx+bw*prog-8,by-2);X.fillText('🏁',bx+bw-10,by-2);
}

function drawParticles(){
  particles.forEach(p=>{
    X.globalAlpha=p.life;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x-camX,p.y,p.r,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
}

function spawnParticles(wx,wy,color,n){
  for(let i=0;i<n;i++){
    particles.push({x:wx,y:wy,vx:(Math.random()-.5)*4,vy:-Math.random()*4-1,
      r:2+Math.random()*4,color,life:1});
  }
}

function updateParticles(){
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.02;});
  particles=particles.filter(p=>p.life>0);
}

// ============================================================
//  WIND INDICATOR
// ============================================================
function drawWindIndicator(){
  const co=COURSES[curCourse];
  if(co.wind<=0)return;
  X.fillStyle='rgba(255,255,255,0.7)';X.font='bold '+Math.min(14,C.width*0.018)+'px sans-serif';
  let str='🍃 かぜ';
  for(let i=0;i<Math.ceil(co.wind*10);i++)str+=' ←';
  X.fillText(str,C.width-180,20);
}

// ============================================================
//  UPDATE PLAYING
// ============================================================
function updatePlaying(){
  const co=COURSES[curCourse];
  tick++;

  // Movement
  if(keys.right)tk.x+=tk.spd;
  if(keys.left)tk.x=Math.max(0,tk.x-tk.spd);

  // Wind
  if(co.wind>0&&keys.right){
    tk.x-=co.wind; // wind pushes back
  }

  // Jump
  if(keys.up&&tk.og){tk.vy=-12;tk.og=false;sndJump();}

  // Gravity
  if(!tk.og){
    tk.vy+=0.6;tk.y+=tk.vy;
    if(tk.y>=0){tk.y=0;tk.vy=0;tk.og=true;}
  }

  // Shoot
  if(bCool>0)bCool--;
  if(keys.space&&bCool<=0){
    bullets.push({x:tk.x+tk.w,y:gY()-tk.h/2+tk.y+10,vx:8});
    bCool=10;sndWater();
  }

  // Update bullets
  bullets.forEach(b=>b.x+=b.vx);
  bullets=bullets.filter(b=>b.x-camX<C.width+50);

  // Bullet-fire collision
  bullets.forEach(b=>{
    fires.forEach(f=>{
      if(!f.alive)return;
      let offsetY=0;
      if(f.moving)offsetY=Math.sin(tick*f.freq+f.phase)*f.amp;
      let fy=gY()-f.h+offsetY;
      if(b.x>f.x-10&&b.x<f.x+f.w+10&&b.y>fy-15&&b.y<fy+f.h+15){
        f.alive=false;score+=100;sndExt();
        spawnParticles(f.x+f.w/2,gY()-f.h/2,['#00BFFF','#87CEEB','#fff'][Math.floor(Math.random()*3)],10);
        b.x=-9999;
      }
    });
  });
  bullets=bullets.filter(b=>b.x>-9000);

  // Obstacle collision
  obstacles.forEach(o=>{
    let sx=tk.x+tk.w*0.1,sw=tk.w*0.8;
    let sy=gY()-tk.h+tk.y,sh=tk.h;
    if(sx+sw>o.x&&sx<o.x+o.w&&sy+sh>gY()-o.h&&sy+sh<=gY()+5){
      // Block: push truck back
      if(tk.og){
        tk.x=o.x-tk.w*0.9;
        sndHit();
      }
    }
  });

  // Camera
  camX=tk.x-C.width*0.3;if(camX<0)camX=0;

  // Fire frames
  fires.forEach(f=>{if(f.alive)f.fr++;});

  updateParticles();

  // Check goal
  if(tk.x>=co.len-50){
    state='minigame';
    document.getElementById('controls').style.display='none';
  }

  // HUD
  document.getElementById('scoreDisp').textContent='⭐ '+score;
  document.getElementById('courseDisp').textContent='🚒 コース '+(curCourse+1)+' ／ '+Math.floor(tk.x/10)+'m';
}

// ============================================================
//  MINI-GAME
// ============================================================
function drawMiniGame(){
  drawSky();X.fillStyle='rgba(0,0,0,0.05)';X.fillRect(0,0,C.width,C.height);
  drawGround();

  let b=mgBuilding;
  X.fillStyle='#AA4444';X.fillRect(b.x,b.y,b.w,b.h);
  X.fillStyle='#FFE0A0';
  for(let wy=b.y+20;wy<b.y+b.h-20;wy+=42){
    for(let wx=b.x+20;wx<b.x+b.w-20;wx+=48){X.fillRect(wx,wy,28,28);}
  }

  // Fires
  miniFires.forEach(f=>{
    if(!f.alive)return;f.fr++;
    drawFire(f.x-f.r,f.y-f.r,f.r*2,f.r*2,f.fr);
  });

  // Static truck
  let tx=C.width/2-45,ty=gY()-60;
  X.fillStyle='#FF2222';X.fillRect(tx,ty+10,90,35);
  X.fillStyle='#CC0000';X.fillRect(tx+60,ty,30,45);
  X.fillStyle='#AAE0FF';X.fillRect(tx+65,ty+5,20,18);
  X.fillStyle='#333';
  X.beginPath();X.arc(tx+20,ty+45,10,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(tx+70,ty+45,10,0,Math.PI*2);X.fill();
  X.font='14px serif';X.fillText('😤',tx+62,ty+38);

  let alive=miniFires.filter(f=>f.alive).length;
  X.fillStyle='#fff';X.font='bold '+Math.min(28,C.width*0.035)+'px sans-serif';
  X.textAlign='center';
  X.fillText('🔥 ひを タップして けそう！ 🔥',C.width/2,36);
  X.font='bold '+Math.min(22,C.width*0.028)+'px sans-serif';
  X.fillText('のこり: '+alive+' / '+miniFires.length,C.width/2,68);
  X.textAlign='left';

  drawParticles();updateParticles();
}

function updateMiniGame(){
  let alive=miniFires.filter(f=>f.alive).length;

  // Boss: regenerate fires once when half are gone
  if(COURSES[curCourse].boss&&!mgRegenUsed&&alive<=Math.floor(miniFires.length/2)){
    mgRegenUsed=true;
    let count=Math.floor(miniFires.length*0.4);
    for(let i=0;i<count;i++){
      miniFires.push({
        x:mgBuilding.x+25+Math.random()*(mgBuilding.w-70),
        y:mgBuilding.y+20+Math.random()*(mgBuilding.h-80),
        r:16+Math.random()*12,alive:true,fr:0,regen:true
      });
    }
    // Flash warning
    tone(300,.3,'sawtooth',.12);
  }

  alive=miniFires.filter(f=>f.alive).length;
  if(alive===0){
    score+=500;
    finishStage();
  }
}

function handleMiniTap(mx,my){
  if(state!=='minigame')return;
  let hit=false;
  miniFires.forEach(f=>{
    if(!f.alive)return;
    let dx=mx-f.x,dy=my-f.y;
    if(Math.sqrt(dx*dx+dy*dy)<f.r+20){
      f.alive=false;score+=50;sndExt();hit=true;
      spawnParticles(f.x,f.y,'#00BFFF',8);
    }
  });
  if(!hit){
    // Water splash at tap location
    spawnParticles(mx,my,'#87CEEB',5);
    sndWater();
  }
  document.getElementById('scoreDisp').textContent='⭐ '+score;
}

// ============================================================
//  STAGE FINISH
// ============================================================
function finishStage(){
  state='stageClear';
  const co=COURSES[curCourse];

  // Calculate stars: based on fires extinguished + bonus
  let maxFireScore=co.fires*100+co.miniFires*50+500;
  let pct=score/maxFireScore;
  let stars=pct>=0.9?3:pct>=0.6?2:1;

  // Save
  let prev=save.stars[curCourse+1]||0;
  if(stars>prev)save.stars[curCourse+1]=stars;
  if(curCourse+2>save.unlocked&&curCourse+2<=10)save.unlocked=curCourse+2;
  doSave();

  // Show overlay
  document.getElementById('clrStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('clrScore').textContent='スコア: '+score;
  document.getElementById('stageClrScreen').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';

  // Next button visibility
  document.getElementById('btnNextCourse').style.display=curCourse<9?'inline-block':'none';

  sndVictory();
}

// ============================================================
//  COURSE SELECT SCREEN
// ============================================================
function buildCourseSelect(){
  let grid=document.getElementById('courseGrid');
  grid.innerHTML='';
  for(let i=0;i<10;i++){
    let co=COURSES[i];
    let unlocked=i+1<=save.unlocked;
    let stars=save.stars[i+1]||0;
    let card=document.createElement('div');
    card.className='courseCard '+(unlocked?'unlocked':'locked');
    card.innerHTML=`<div class="courseNum">${unlocked?'コース'+(i+1):'🔒'}</div>`+
      `<div class="courseStars">${unlocked?(stars>0?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'---'):'---'}</div>`+
      `<div class="courseDiff">${unlocked?co.label:''}</div>`;
    if(unlocked){
      card.addEventListener('click',(function(idx){return function(){startCourse(idx);};})(i));
    }
    grid.appendChild(card);
  }
}

function showCourseSelect(){
  state='courseSelect';
  buildCourseSelect();
  document.getElementById('startScreen').style.display='none';
  document.getElementById('courseScreen').style.display='flex';
  document.getElementById('stageClrScreen').style.display='none';
  document.getElementById('victoryScreen').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';
}

function startCourse(idx){
  initAudio();
  curCourse=idx;
  genWorld();
  state='playing';
  document.getElementById('courseScreen').style.display='none';
  document.getElementById('stageClrScreen').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('controls').style.display='flex';
  tone(523,.12,'square',.08);setTimeout(()=>tone(659,.12,'square',.08),120);
  setTimeout(()=>tone(784,.15,'square',.08),240);
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop(){
  X.clearRect(0,0,C.width,C.height);

  if(state==='playing'){
    updatePlaying();
    drawSky();drawClouds();drawBuildings();drawTrees();drawGround();
    drawObstacles();drawWorldFires();drawBullets();drawGoalMarker();
    drawTruck(tk.x,tk.y);drawProgressBar();drawWindIndicator();drawParticles();
  }else if(state==='minigame'){
    updateMiniGame();drawMiniGame();
  }

  requestAnimationFrame(loop);
}

// ============================================================
//  INPUT
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')keys.left=true;
  if(e.key==='ArrowRight')keys.right=true;
  if(e.key==='ArrowUp')keys.up=true;
  if(e.key===' '){keys.space=true;e.preventDefault();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft')keys.left=false;
  if(e.key==='ArrowRight')keys.right=false;
  if(e.key==='ArrowUp')keys.up=false;
  if(e.key===' ')keys.space=false;
});

function setupTouchBtn(id,key){
  let el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[key]=true;};
  const off=e=>{e.preventDefault();keys[key]=false;};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',()=>keys[key]=true);
  el.addEventListener('mouseup',()=>keys[key]=false);
  el.addEventListener('mouseleave',()=>keys[key]=false);
}
setupTouchBtn('tbL','left');
setupTouchBtn('tbR','right');
setupTouchBtn('tbJ','up');
setupTouchBtn('tbW','space');

// Mini-game tap
C.addEventListener('click',e=>{
  if(state!=='minigame')return;
  let r=C.getBoundingClientRect();
  handleMiniTap(e.clientX-r.left,e.clientY-r.top);
});
C.addEventListener('touchstart',e=>{
  if(state!=='minigame')return;
  e.preventDefault();
  let t=e.touches[0],r=C.getBoundingClientRect();
  handleMiniTap(t.clientX-r.left,t.clientY-r.top);
},{passive:false});

// ============================================================
//  BUTTONS
// ============================================================
document.getElementById('btnStart').addEventListener('click',showCourseSelect);
document.getElementById('courseBackBtn').addEventListener('click',()=>{
  document.getElementById('courseScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  state='start';
});
document.getElementById('btnNextCourse').addEventListener('click',()=>{
  if(curCourse<9)startCourse(curCourse+1);
});
document.getElementById('btnBackSelect').addEventListener('click',showCourseSelect);

// ============================================================
//  START
// ============================================================
loop();
</script>
</body>
